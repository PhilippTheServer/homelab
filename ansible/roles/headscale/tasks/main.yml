---
- name: Create headscale directories
  file:
    path: "{{ homelab_base_dir }}/services/headscale/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'
  loop:
    - ""
    - config

- name: Render docker-compose.yml
  template:
    src: "{{ playbook_dir }}/../services/headscale/docker-compose.yml.j2"
    dest: "{{ homelab_base_dir }}/services/headscale/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
  notify: restart headscale

- name: Render headscale config.yaml
  template:
    src: "{{ playbook_dir }}/../services/headscale/config.yaml.j2"
    dest: "{{ homelab_base_dir }}/services/headscale/config/config.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
  notify: restart headscale

- name: Render headplane config.yaml
  template:
    src: "{{ playbook_dir }}/../services/headscale/headplane.yaml.j2"
    dest: "{{ homelab_base_dir }}/services/headscale/headplane.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'

- name: Ensure headscale stack is running
  command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ homelab_base_dir }}/services/headscale"
  become_user: "{{ deploy_user }}"
  changed_when: false
