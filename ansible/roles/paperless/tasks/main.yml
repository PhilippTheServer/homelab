---
- name: Create paperless directory
  file:
    path: "{{ homelab_base_dir }}/services/paperless"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'

- name: Render docker-compose.yml
  template:
    src: "{{ playbook_dir }}/../services/paperless/docker-compose.yml.j2"
    dest: "{{ homelab_base_dir }}/services/paperless/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
  notify: restart paperless

- name: Ensure paperless stack is running
  command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ homelab_base_dir }}/services/paperless"
  become_user: "{{ deploy_user }}"
  changed_when: false
