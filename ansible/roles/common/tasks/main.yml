---
# ── Prerequisites ──────────────────────────────────────────────────────────────
- name: Install apt prerequisites
  apt:
    name: [ca-certificates, curl, gnupg, ufw, python3-pip]
    state: present
    update_cache: true

# ── Docker ─────────────────────────────────────────────────────────────────────
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker APT repository
  apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_lsb.codename }} stable
    state: present
    filename: docker

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

# ── Firewall ───────────────────────────────────────────────────────────────────
- name: Set UFW default incoming policy to deny
  ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP (Traefik)
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS (Traefik)
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow DNS TCP (Pi-hole)
  ufw:
    rule: allow
    port: '53'
    proto: tcp

- name: Allow DNS UDP (Pi-hole)
  ufw:
    rule: allow
    port: '53'
    proto: udp

- name: Enable UFW
  ufw:
    state: enabled
    logging: 'on'

# ── Directory structure ────────────────────────────────────────────────────────
- name: Create homelab base directory
  file:
    path: "{{ homelab_base_dir }}/services"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'
    recurse: true

# ── Shared Docker network ──────────────────────────────────────────────────────
- name: Check if proxy network exists
  command: docker network inspect proxy
  register: proxy_network
  failed_when: false
  changed_when: false

- name: Create proxy Docker network
  command: docker network create proxy
  when: proxy_network.rc != 0
