---
- name: Create traefik directories
  file:
    path: "{{ homelab_base_dir }}/services/traefik/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'
  loop:
    - ""
    - dynamic

- name: Render docker-compose.yml
  template:
    src: "{{ playbook_dir }}/../services/traefik/docker-compose.yml.j2"
    dest: "{{ homelab_base_dir }}/services/traefik/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
  notify: restart traefik

- name: Render traefik dynamic TLS options
  template:
    src: "{{ playbook_dir }}/../services/traefik/dynamic/tls-options.yaml.j2"
    dest: "{{ homelab_base_dir }}/services/traefik/dynamic/tls-options.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'
  notify: restart traefik

- name: Create proxy Docker network
  community.docker.docker_network:
    name: proxy
    state: present

- name: Ensure traefik stack is running
  command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ homelab_base_dir }}/services/traefik"
  become_user: "{{ deploy_user }}"
  changed_when: false
