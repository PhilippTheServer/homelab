---
- name: restart traefik
  command:
    cmd: docker compose up -d --force-recreate --remove-orphans
    chdir: "{{ homelab_base_dir }}/services/traefik"
  become_user: "{{ deploy_user }}"

- name: wait for traefik to be ready
  listen: restart traefik
  wait_for:
    port: 443
    delay: 3
    timeout: 30
