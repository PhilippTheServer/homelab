---
# Shared deploy primitive for Docker-Compose services. Callers set `compose_service`
# (required) and override the vars below as needed via `include_role: vars:`.

# Subdirectories created UNDER the service dir
# ({{ homelab_base_dir }}/services/{{ compose_service }}). "" == the service dir itself.
compose_dirs: [""]

# Absolute directories to create (siblings of services/, e.g. media mounts).
compose_extra_dirs: []

# Templates to render. `src` is relative to services/{{ compose_service }}/ in the repo;
# `dest` is relative to the service dir on the host. `mode` defaults to 0640.
compose_templates:
  - { src: docker-compose.yml.j2, dest: docker-compose.yml }

# docker_compose_v2 behaviour.
#   recreate: auto  -> recreate a container only when its compose definition changed
#   pull:     missing -> pull only if the image is absent (matches `docker compose up -d`)
compose_recreate: auto
compose_pull: missing

# Services to `restart` when a *bind-mounted config file* changed but the compose file
# itself did not (config-only reload). Empty = nothing to restart. This preserves the
# behaviour of the old per-role `--force-recreate` / `restart` handlers.
compose_restart_services: []
