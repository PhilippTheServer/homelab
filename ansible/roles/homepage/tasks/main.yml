---
# Ensure the images dir exists before downloading the wallpaper (get_url does not
# create parent dirs). compose_stack re-creates it idempotently during deploy.
- name: Ensure homepage images directory exists
  ansible.builtin.file:
    path: "{{ homelab_base_dir }}/services/homepage/images"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'

- name: Download background wallpaper
  ansible.builtin.get_url:
    url: https://wallpapercave.com/wp/wp8982796.jpg
    dest: "{{ homelab_base_dir }}/services/homepage/images/background.jpg"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
    force: false

- name: Deploy homepage compose stack
  ansible.builtin.include_role:
    name: compose_stack
  vars:
    compose_service: homepage
    compose_dirs: ["", "config", "images"]
    compose_templates:
      - { src: config/settings.yaml.j2, dest: config/settings.yaml }
      - { src: config/services.yaml.j2, dest: config/services.yaml }
      - { src: config/widgets.yaml.j2, dest: config/widgets.yaml }
      - { src: config/bookmarks.yaml.j2, dest: config/bookmarks.yaml }
      - { src: config/docker.yaml.j2, dest: config/docker.yaml }
      - { src: docker-compose.yml.j2, dest: docker-compose.yml }
    # homepage re-reads its config on restart (not recreate) — matches the old
    # `docker compose restart homepage` handler.
    compose_restart_services: ["homepage"]
