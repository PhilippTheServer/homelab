---
- name: Deploy jellyfin compose stack
  ansible.builtin.include_role:
    name: compose_stack
  vars:
    compose_service: jellyfin
    # Media library lives outside services/ and is bind-mounted read-only into the
    # container ({{ homelab_base_dir }}/media:/media:ro).
    compose_extra_dirs:
      - "{{ homelab_base_dir }}/media"
