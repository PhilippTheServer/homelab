---
# ── Network ────────────────────────────────────────────────────────────────────
domain: "philippthesurfer.com"
internal_subdomain: "home"
minipc_ip: "192.168.178.20"

# ── Ansible / Deploy ───────────────────────────────────────────────────────────
deploy_user: philipp
homelab_base_dir: /opt/homelab

# ── Let's Encrypt ──────────────────────────────────────────────────────────────
traefik_acme_email: "philipp-l20@protonmail.com"
letsencrypt_staging: false

# ── Service versions (pin these, update deliberately) ──────────────────────────
traefik_version: "v3.7"
keycloak_version: "26.6"
headscale_version: "latest"
hcvault_version: "2.0"
vaultwarden_version: "1.36.0"
postgres_version: "18-alpine"
gitlab_version: "19.0.0-ce.0"
harbor_version: "v2.14.0"
pihole_version: "2026.05.0"
homepage_version: "latest"

# ── Secrets (fetched from HashiCorp Vault at runtime) ──────────────────────────
# Requires VAULT_TOKEN in the environment before running any playbook.
# All fields live in a single KV v2 entry at secret/data/ansible.
# Field names = variable names without the vault_ prefix.
_vault_secrets: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/ansible') }}"

vault_minipc_passwd:            "{{ _vault_secrets.minipc_passwd }}"
vault_namecheap_api_user:       "{{ _vault_secrets.namecheap_api_user }}"
vault_namecheap_api_key:        "{{ _vault_secrets.namecheap_api_key }}"
vault_namecheap_ddns_password:  "{{ _vault_secrets.namecheap_ddns_password }}"
vault_traefik_dashboard_auth:   "{{ _vault_secrets.traefik_dashboard_auth }}"
vault_keycloak_db_password:     "{{ _vault_secrets.keycloak_db_password }}"
vault_keycloak_admin_user:      "{{ _vault_secrets.keycloak_admin_user }}"
vault_keycloak_admin_password:  "{{ _vault_secrets.keycloak_admin_password }}"
vault_headscale_db_password:    "{{ _vault_secrets.headscale_db_password }}"
vault_headscale_oidc_secret:    "{{ _vault_secrets.headscale_oidc_secret }}"
vault_headplane_api_key:        "{{ _vault_secrets.headplane_api_key }}"
vault_headplane_cookie_secret:  "{{ _vault_secrets.headplane_cookie_secret }}"
vault_hcvault_oidc_secret:      "{{ _vault_secrets.hcvault_oidc_secret }}"
vault_vaultwarden_db_password:  "{{ _vault_secrets.vaultwarden_db_password }}"
vault_vaultwarden_admin_token:  "{{ _vault_secrets.vaultwarden_admin_token }}"
vault_vaultwarden_oidc_secret:  "{{ _vault_secrets.vaultwarden_oidc_secret }}"
vault_gitlab_root_password:     "{{ _vault_secrets.gitlab_root_password }}"
vault_gitlab_oidc_secret:       "{{ _vault_secrets.gitlab_oidc_secret }}"
vault_gitlab_api_token:         "{{ _vault_secrets.gitlab_api_token }}"
vault_harbor_admin_password:        "{{ _vault_secrets.harbor_admin_password }}"
vault_harbor_db_password:           "{{ _vault_secrets.harbor_db_password }}"
vault_harbor_oidc_secret:           "{{ _vault_secrets.harbor_oidc_secret }}"
vault_harbor_core_secret:           "{{ _vault_secrets.harbor_core_secret }}"
vault_harbor_jobservice_secret:     "{{ _vault_secrets.harbor_jobservice_secret }}"
vault_harbor_csrf_key:              "{{ _vault_secrets.harbor_csrf_key }}"
vault_harbor_registry_http_secret:  "{{ _vault_secrets.harbor_registry_http_secret }}"
vault_pihole_webpassword:       "{{ _vault_secrets.pihole_webpassword }}"
vault_homepage_oidc_secret:     "{{ _vault_secrets.homepage_oidc_secret }}"
vault_homepage_nextauth_secret: "{{ _vault_secrets.homepage_nextauth_secret }}"
