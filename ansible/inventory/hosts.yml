---
# SSH access uses HashiCorp Vault-signed certificates (Vault SSH CA), not static
# keys. Before running any playbook, sign your key for the session:
#
#   vault login -method=oidc
#   vault write -field=signed_key ssh/sign/user \
#     public_key="$(cat ~/.ssh/hcvault.pub)" > ~/.ssh/hcvault-cert.pub
#
# OpenSSH then presents the signed cert (~/.ssh/hcvault-cert.pub) for any host
# below. The hosts trust the Vault CA, so no authorized_keys management is needed
# and adding a new machine here is enough to reach it.
all:
  vars:
    ansible_user: philipp
    ansible_port: 1461
    ansible_ssh_private_key_file: ~/.ssh/hcvault
    ansible_ssh_common_args: "-o CertificateFile=~/.ssh/hcvault-cert.pub -o IdentitiesOnly=yes"
  hosts:
    minipc:
      ansible_host: "minipc.{{ internal_subdomain }}.{{ domain }}"
      ansible_sudo_pass: "{{ vault_minipc_passwd }}"
