# Lives at the repo root so it is picked up when running ansible from here.
# (Ansible only reads ansible.cfg from $ANSIBLE_CONFIG, the cwd, ~/.ansible.cfg
# or /etc/ansible — never from the playbook's directory.) Paths are relative to
# this file's location (the repo root).
[defaults]
inventory          = ansible/inventory/hosts.yml
roles_path         = ansible/roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = ansible.builtin.yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s

[hashi_vault_collection]
url = https://vault.home.philippthesurfer.com
auth_method = token
